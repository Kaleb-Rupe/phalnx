name: Revamp CI (v2)

# Runs on the revamp/v2-2026-05 branch only.
# Mirrors agent-middleware/.github/workflows/ci.yml + adds Stage-0-mandated IDL diff guard.
# See agent-middleware/docs/revamp/REVAMP_CI_README.md for full context.

on:
  push:
    branches:
      - "revamp/v2-2026-05"
      - "revamp/**"
  pull_request:
    branches:
      - "revamp/v2-2026-05"
  workflow_dispatch:

# Pinned versions per CodexResearcher 2026-05-17 to eliminate IDL determinism perturbations.
env:
  RUST_VERSION: "1.89.0"
  SOLANA_VERSION: "2.1.14"
  ANCHOR_VERSION: "0.32.1"
  NODE_VERSION: "20"
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"
  SOURCE_DATE_EPOCH: "1577836800"

jobs:
  scope-guard:
    name: Scope guard (docs/revamp + revamp-ci.yml only for Stage 0)
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Verify diff scope of latest push (not cumulative vs main)
        env:
          # The revamp/v2-2026-05 branch can include prior-stage commits (e.g., Stage 1 demolition
          # already landed). Stage 0's scope-guard must only inspect THIS push's new changes,
          # not the cumulative diff vs main (which would flag prior stages as out-of-scope).
          # Paths are relative to the Sigil repo root (agent-middleware/), which is the repo root
          # since origin: Sigil-Trade/sigil maps to agent-middleware/.
          ALLOWED_REGEX: '^(docs/revamp/|\.github/workflows/revamp-ci\.yml)'
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          # Resolve the comparison base: github.event.before is the SHA before this push.
          # For workflow_dispatch / pull_request without a before, fall back to HEAD~1.
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-parse HEAD~1)
            echo "::notice::Using HEAD~1 as base (no github.event.before available)"
          else
            BASE_SHA="$BEFORE_SHA"
            echo "::notice::Using github.event.before=${BASE_SHA} as base"
          fi
          OUT_OF_SCOPE=$(git diff "$BASE_SHA"..HEAD --name-only | grep -vE "$ALLOWED_REGEX" || true)
          if [ -n "$OUT_OF_SCOPE" ]; then
            echo "::error::Out-of-scope files in latest push for Stage 0:"
            echo "$OUT_OF_SCOPE"
            exit 1
          fi
          echo "::notice::Diff scope clean: only docs/revamp + revamp-ci.yml in latest push"

  build-program:
    name: anchor build --no-idl
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-middleware
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust toolchain
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy
      - name: Install Solana CLI
        env:
          SOLANA_INSTALL_VERSION: "2.1.14"
        run: |
          sh -c "$(curl -sSfL "https://release.anza.xyz/v${SOLANA_INSTALL_VERSION}/install")"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        env:
          ANCHOR_INSTALL_VERSION: "0.32.1"
        run: |
          cargo install --git https://github.com/solana-foundation/anchor \
            --tag "v${ANCHOR_INSTALL_VERSION}" anchor-cli --locked
      - name: anchor build --no-idl
        run: anchor build --no-idl
      - name: Upload program .so artifact
        # v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sigil-so
          path: agent-middleware/target/deploy/sigil.so

  idl-drift-check:
    name: IDL drift check (source vs committed)
    runs-on: ubuntu-latest
    needs: build-program
    defaults:
      run:
        working-directory: agent-middleware
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
      - name: Install Rust nightly (for anchor idl build)
        # stable (action SHA; toolchain input below selects nightly)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
      - name: Install Solana CLI
        env:
          SOLANA_INSTALL_VERSION: "2.1.14"
        run: |
          sh -c "$(curl -sSfL "https://release.anza.xyz/v${SOLANA_INSTALL_VERSION}/install")"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        env:
          ANCHOR_INSTALL_VERSION: "0.32.1"
        run: |
          cargo install --git https://github.com/solana-foundation/anchor \
            --tag "v${ANCHOR_INSTALL_VERSION}" anchor-cli --locked
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Save committed IDL
        run: cp target/idl/sigil.json /tmp/sigil.committed.json
      - name: Regenerate IDL via nightly anchor
        run: |
          # anchor idl build writes to target/idl/<program>.json by default.
          # DO NOT use `> target/idl/sigil.json` redirect — that captures stdout (log noise), not JSON.
          RUSTUP_TOOLCHAIN=nightly anchor idl build
      - name: Canonicalize JSON keys (jq -S)
        run: |
          jq -S . /tmp/sigil.committed.json > /tmp/sigil.committed.canonical.json
          jq -S . target/idl/sigil.json > /tmp/sigil.regenerated.canonical.json
      - name: Diff canonicalized IDLs
        run: |
          if ! diff -u /tmp/sigil.committed.canonical.json /tmp/sigil.regenerated.canonical.json; then
            echo "::error::IDL drift detected — committed target/idl/sigil.json does not match program source."
            echo "Resolution: locally run 'anchor build --no-idl && RUSTUP_TOOLCHAIN=nightly anchor idl build && git add agent-middleware/target/idl/ && git commit -m chore: regenerate IDL' and push."
            exit 1
          fi
          echo "::notice::IDL is in sync with program source."

  litesvm-tests:
    name: LiteSVM tests (main pnpm test)
    runs-on: ubuntu-latest
    needs: build-program
    defaults:
      run:
        working-directory: agent-middleware
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6.0.6
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788
        with:
          version: 10.7.1
      # v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: agent-middleware/pnpm-lock.yaml
      - name: Install Rust toolchain
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0
      - name: Install Solana CLI
        env:
          SOLANA_INSTALL_VERSION: "2.1.14"
        run: |
          sh -c "$(curl -sSfL "https://release.anza.xyz/v${SOLANA_INSTALL_VERSION}/install")"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        env:
          ANCHOR_INSTALL_VERSION: "0.32.1"
        run: |
          cargo install --git https://github.com/solana-foundation/anchor \
            --tag "v${ANCHOR_INSTALL_VERSION}" anchor-cli --locked
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: anchor build --no-idl
        run: anchor build --no-idl
      - name: Restore committed IDL
        run: git checkout -- target/idl/ target/types/
      - name: pnpm test (LiteSVM tier)
        run: pnpm test

  sdk-pretest:
    name: SDK kit pretest (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-middleware/sdk/kit
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6.0.6
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788
        with:
          version: 10.7.1
      # v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: agent-middleware/pnpm-lock.yaml
      - name: pnpm install (root)
        run: cd ../.. && pnpm install --frozen-lockfile
      - name: Run pretest (tsc --noEmit)
        run: pnpm run pretest

  sdk-tests:
    name: SDK kit tests
    runs-on: ubuntu-latest
    needs: sdk-pretest
    defaults:
      run:
        working-directory: agent-middleware/sdk/kit
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6.0.6
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788
        with:
          version: 10.7.1
      # v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: agent-middleware/pnpm-lock.yaml
      - name: pnpm install (root)
        run: cd ../.. && pnpm install --frozen-lockfile
      - name: Run SDK tests
        run: pnpm test

  cargo-unit-tests:
    name: cargo test --lib
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-middleware
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust toolchain
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0
      - name: cargo test --lib
        run: cargo test --manifest-path programs/sigil/Cargo.toml --lib

  surfpool-tests:
    name: Surfpool integration tests
    runs-on: ubuntu-latest
    needs: build-program
    defaults:
      run:
        working-directory: agent-middleware
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6.0.6
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788
        with:
          version: 10.7.1
      # v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: agent-middleware/pnpm-lock.yaml
      - name: Install Rust toolchain
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0
      - name: Install Solana CLI
        env:
          SOLANA_INSTALL_VERSION: "2.1.14"
        run: |
          sh -c "$(curl -sSfL "https://release.anza.xyz/v${SOLANA_INSTALL_VERSION}/install")"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor CLI
        env:
          ANCHOR_INSTALL_VERSION: "0.32.1"
        run: |
          cargo install --git https://github.com/solana-foundation/anchor \
            --tag "v${ANCHOR_INSTALL_VERSION}" anchor-cli --locked
      - name: Install Surfpool
        run: |
          # Don't swallow errors silently. If install fails because already-installed,
          # `cargo install --force` recompiles; otherwise propagate.
          if ! command -v surfpool >/dev/null 2>&1; then
            cargo install surfpool
          else
            echo "::notice::surfpool already installed at $(command -v surfpool)"
          fi
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: anchor build --no-idl
        run: anchor build --no-idl
      - name: Restore committed IDL
        run: git checkout -- target/idl/ target/types/
      - name: Start surfpool + run tests
        run: |
          npm run surfpool:start &
          SURFPOOL_PID=$!
          sleep 5
          npm run test:surfpool || (kill $SURFPOOL_PID; exit 1)
          kill $SURFPOOL_PID

  k6-emit-check:
    # K6 load-bearing-5 static check per Architect 2026-05-17 + INTERFACES_V2 §K6.
    # Stage 0: this job is a placeholder that always passes — the actual check is a Stage 2 deliverable
    # once V2 program code lands. Documented to satisfy ACCEPTANCE_V2.md §3.6 load-bearing-5 gate.
    name: K6 emit static check (Stage 0 placeholder; Stage 2 implements)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-middleware
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: K6 static check placeholder
        run: |
          echo "::notice::Stage 0 placeholder. Stage 2 implements: every pub fn in lib.rs must call emit!() exactly once before Ok(()). See ACCEPTANCE_V2.md section 3.5 Inv-K6 formal verification target."
          # Stage 2 will add:
          #   grep -c '^    pub fn ' programs/sigil/src/lib.rs > /tmp/fn_count
          #   grep -c 'emit!(' programs/sigil/src/lib.rs > /tmp/emit_count
          #   diff /tmp/fn_count /tmp/emit_count || exit 1

  summary:
    name: CI summary (final gate)
    runs-on: ubuntu-latest
    needs:
      - scope-guard
      - build-program
      - idl-drift-check
      - litesvm-tests
      - sdk-pretest
      - sdk-tests
      - cargo-unit-tests
      - surfpool-tests
      - k6-emit-check
    steps:
      - name: All checks passed
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "::notice::Revamp CI all jobs passed for ${BRANCH}"
          echo "Per ACCEPTANCE_V2.md section 3.6, this is the test-coverage gate signal."
